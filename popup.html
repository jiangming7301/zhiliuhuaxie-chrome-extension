<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* 手稿编辑台 · Editor's Desk
       宋体 × 印章朱砂 × 象牙纸本 — 文档工具应有的东方编辑美学 */
    :root {
      --paper: #f4f1ea;
      --paper-soft: #ece8dc;
      --paper-deep: #e2ddce;
      --ink: #1a1a1a;
      --ink-2: #2e2c27;
      --ink-soft: #55524b;
      --ink-faded: #8f8b80;
      --ink-ghost: #b8b4a8;
      --rule: #1a1a1a;
      --seal: #b4281e;
      --seal-ink: #8c1e15;
      --seal-soft: #f1e3df;
      --moss: #4a5d3f;
      --moss-soft: #e6ede0;
      --amber: #8a5a14;
      --amber-soft: #f2e8d2;
      --serif: 'Songti SC', 'STSong', 'Source Han Serif CN', 'Noto Serif CJK SC', 'SimSun', Georgia, 'Times New Roman', serif;
      --sans: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
      --mono: 'SF Mono', Menlo, Monaco, 'Cascadia Mono', Consolas, 'Courier New', monospace;
    }

    * { box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 100vh;
      padding: 18px;
      margin: 0;
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.55;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'palt' 1;
    }

    .app-shell {
      width: 100%;
      background: var(--paper);
      padding: 26px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      border: 1px solid var(--ink);
      border-radius: 2px;
      box-shadow: 4px 4px 0 0 var(--ink);
    }
    /* 纸张四角的装饰折角 */
    .app-shell::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 1px solid rgba(26, 26, 26, 0.08);
      pointer-events: none;
    }

    .header {
      text-align: left;
      margin: 0 0 2px;
      position: relative;
      padding: 24px 0 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .title {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* 朱砂印章方块 */
    .title::after {
      content: '记';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: var(--seal);
      color: var(--paper);
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 600;
      border-radius: 1px;
      transform: rotate(-3deg);
      box-shadow: 1px 1px 0 rgba(26, 26, 26, 0.25);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      border-radius: 0;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .status::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ink-ghost);
      border: 1px solid var(--ink-soft);
    }
    .status.recording {
      color: var(--seal);
    }
    .status.recording::before {
      background: var(--seal);
      border-color: var(--seal-ink);
      animation: sealPulse 1.4s ease-in-out infinite;
    }
    .status.stopped { color: var(--ink-soft); }
    @keyframes sealPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(180, 40, 30, 0.55); }
      50%      { box-shadow: 0 0 0 5px rgba(180, 40, 30, 0); }
    }

    .plan-badge {
      position: absolute;
      top: 22px;
      right: 22px;
      display: none;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 1px;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 2;
      justify-content: center;
    }
    .plan-badge.premium {
      background: var(--ink);
      color: var(--paper);
    }
    .plan-badge.free {
      background: var(--paper);
      color: var(--ink);
    }
    .plan-badge .plan-addon { font-size: 9px; opacity: 0.75; color: inherit; }
    .plan-badge .plan-label { font-size: 10px; }
    .plan-badge .subscription-countdown {
      font-size: 10px;
      font-weight: 500;
      color: inherit;
      animation: none;
    }
    .plan-badge .plan-renew {
      background: transparent;
      border: 1px solid currentColor;
      border-radius: 1px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 9px;
      color: inherit;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .plan-badge .plan-renew:hover {
      background: currentColor;
      color: var(--paper);
    }
    .plan-badge.premium .plan-renew:hover { color: var(--ink); }
    .plan-badge.plan-warning {
      border-color: var(--seal);
      color: var(--seal);
      animation: sealPulse 1.8s ease-in-out infinite;
    }
    /* 订阅状态样式 */
    .subscription-status {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
    }
    .subscription-info.professional {
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      border-radius: 2px;
      padding: 12px 14px;
      font-family: var(--sans);
    }
    .subscription-info.free {
      background: var(--paper-soft);
      color: var(--ink);
      border: 1px solid var(--ink);
      border-radius: 2px;
      padding: 12px 14px;
    }
    .subscription-type {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .subscription-countdown {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 5px;
      opacity: 0.85;
    }
    .subscription-countdown.warning {
      color: var(--seal);
      font-weight: 600;
      animation: pulseFade 2s infinite;
    }
    @keyframes pulseFade {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .renew-reminder {
      margin-top: 8px;
      padding: 6px 8px;
      background: rgba(244, 241, 234, 0.15);
      border: 1px solid rgba(244, 241, 234, 0.3);
      border-radius: 1px;
      font-size: 11px;
      font-family: var(--mono);
    }
    .renew-reminder p { margin: 0 0 4px 0; }
    
    /* 分节标签 —— 类似书籍章节小标题 */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 2px 0 -6px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ink);
      opacity: 0.35;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }
    .longshot-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .btn {
      padding: 11px 16px;
      border: 1px solid var(--ink);
      border-radius: 2px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      letter-spacing: 0.08em;
      transition: transform 0.08s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--paper);
      color: var(--ink);
      position: relative;
    }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
    }
    .btn:hover:not(:disabled) {
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 0 var(--ink);
    }
    .btn:active:not(:disabled) {
      transform: translate(0, 0);
      box-shadow: 0 0 0 0 var(--ink);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--ink-2);
      box-shadow: 2px 2px 0 0 var(--seal);
    }

    .btn-secondary {
      background: var(--paper);
      color: var(--ink);
      border-color: var(--ink);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--paper-soft);
    }

    /* btn-info 用于"整页截图"与"导出文档"，给它一个可辨识的朱砂边纹 */
    .btn-info {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
      box-shadow: 2px 2px 0 0 var(--seal);
    }
    .btn-info::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--seal);
      display: inline-block;
      border-radius: 1px;
      transform: rotate(45deg);
      margin-right: 2px;
    }
    .btn-info:hover:not(:disabled) {
      background: var(--seal);
      color: var(--paper);
      box-shadow: 2px 2px 0 0 var(--ink);
    }
    .btn-info:hover:not(:disabled)::before {
      background: var(--paper);
    }

    .btn-small {
      padding: 5px 10px;
      font-size: 10px;
      border-radius: 1px;
      align-self: flex-start;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    /* 统计面板 —— 打字机点线对齐 */
    .stats {
      margin-top: 4px;
      padding: 14px 16px 12px;
      background: var(--paper-soft);
      border: 1px solid var(--ink);
      border-radius: 2px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }
    .stats::before {
      content: 'STATS';
      position: absolute;
      top: -7px;
      left: 12px;
      background: var(--paper);
      padding: 0 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--ink);
      font-weight: 600;
    }
    .longshot-status {
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 12px;
      border-radius: 1px;
      background: var(--paper-soft);
      color: var(--ink);
      border: 1px dashed var(--ink);
      display: none;
      letter-spacing: 0.04em;
    }
    .longshot-status.capturing {
      background: var(--amber-soft);
      color: var(--amber);
      border: 1px dashed var(--amber);
    }
    .longshot-status.error {
      background: var(--seal-soft);
      color: var(--seal-ink);
      border: 1px solid var(--seal);
    }
    .longshot-status.success {
      background: var(--moss-soft);
      color: var(--moss);
      border: 1px solid var(--moss);
    }
    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-family: var(--sans);
    }
    .stat-item span:first-child {
      color: var(--ink-soft);
      font-weight: 400;
      font-size: 12px;
      flex-shrink: 0;
    }
    .stat-item::before {
      content: '';
      flex: 1;
      order: 2;
      height: 0;
      border-bottom: 1px dotted var(--ink-faded);
      transform: translateY(-3px);
      min-width: 12px;
    }
    .stat-item span:first-child { order: 1; }
    .stat-item span:last-child {
      order: 3;
      font-family: var(--mono);
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* 使用状态 */
    .usage-info {
      margin: 0;
      padding: 12px 14px 14px;
      background: var(--paper);
      border: 1px solid var(--ink);
      border-radius: 2px;
      font-size: 12px;
    }
    .usage-unlimited {
      text-align: left;
      color: var(--moss);
      font-weight: 500;
      background: transparent;
      border: none;
      padding: 0;
      font-family: var(--sans);
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .usage-unlimited::before {
      content: '∞  ';
      font-family: var(--mono);
      font-size: 16px;
      vertical-align: middle;
    }
    .usage-progress {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .usage-text {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-soft);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--paper-deep);
      border: none;
      overflow: hidden;
      margin: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--ink);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .remaining-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faded);
      letter-spacing: 0.06em;
    }

    /* 截图列表 */
    .screenshots-section {
      margin-top: 6px;
      border-top: 1px solid var(--ink);
      padding-top: 14px;
      position: relative;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '◈';
      color: var(--seal);
      font-size: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 0;
      border-bottom: 1px dashed var(--ink-faded);
    }
    .screenshots-list {
      max-height: none;
      overflow-y: visible;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .no-screenshots {
      text-align: center;
      color: var(--ink-faded);
      font-family: var(--serif);
      font-size: 13px;
      padding: 24px 16px;
      background: var(--paper-soft);
      border: 1px dashed var(--ink-faded);
      border-radius: 1px;
      letter-spacing: 0.1em;
      font-style: italic;
    }
    .screenshot-item {
      border: 1px solid var(--ink);
      border-radius: 1px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: 3px 3px 0 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .screenshot-item:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 0 var(--seal);
    }
    .screenshot-header {
      background: var(--paper-soft);
      padding: 9px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--ink);
    }
    .screenshot-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .screenshot-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .edit-button {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
      border-radius: 1px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .edit-button:hover {
      background: var(--moss);
      border-color: var(--moss);
      color: var(--paper);
    }
    .rerecord-button {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
      border-radius: 1px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
      padding: 0;
    }
    .rerecord-button:hover {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--paper);
    }
    .rerecord-button svg { width: 12px; height: 12px; }
    .rerecord-url {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-soft);
      word-break: break-all;
      margin: 8px 0;
      padding: 6px 8px;
      background: var(--paper-soft);
      border: 1px dashed var(--ink-faded);
      border-radius: 1px;
      letter-spacing: 0.02em;
    }
    .screenshot-index {
      background: var(--seal);
      color: var(--paper);
      padding: 2px 7px;
      border-radius: 1px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      min-width: 22px;
      text-align: center;
      letter-spacing: 0.04em;
      transform: rotate(-1deg);
      box-shadow: 1px 1px 0 rgba(26, 26, 26, 0.2);
    }
    .screenshot-url {
      flex: 1;
      margin: 0 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .play-button {
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      border-radius: 1px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s ease;
      padding: 0;
    }
    .play-button:hover { background: var(--seal); border-color: var(--seal); }
    .play-button svg { width: 12px; height: 12px; }
    .screenshot-content {
      padding: 10px;
      background: var(--paper);
    }
    .screenshot-image {
      width: 100%;
      height: auto;
      max-height: none;
      max-width: 100%;
      object-fit: contain;
      border-radius: 1px;
      margin-bottom: 8px;
      border: 1px solid var(--ink-faded);
      box-shadow: 2px 2px 0 0 rgba(26, 26, 26, 0.12);
    }
    .screenshot-info {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-soft);
      line-height: 1.5;
    }
    .screenshot-info p { margin: 2px 0; letter-spacing: 0.02em; }

    /* ——— 模态框：编辑器 / 对话框 ——— */
    .editor-modal {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.72);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .editor-modal-content {
      background: var(--paper);
      border: 1px solid var(--ink);
      border-radius: 2px;
      box-shadow: 6px 6px 0 0 var(--ink);
      width: 90vw;
      height: 85vh;
      max-width: 1400px;
      max-height: 900px;
      display: flex;
      flex-direction: column;
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--ink);
      background: var(--paper-soft);
    }
    .editor-header h3 {
      margin: 0;
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--ink);
    }
    .close-btn {
      background: transparent;
      border: 1px solid var(--ink);
      border-radius: 1px;
      font-size: 18px;
      cursor: pointer;
      color: var(--ink);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .close-btn:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .editor-body { flex: 1; display: flex; flex-direction: column; padding: 0; }
    .editor-toolbar {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--ink);
      background: var(--paper);
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar-divider {
      width: 1px;
      height: 22px;
      background: var(--ink-faded);
      margin: 0 6px;
    }
    .color-picker-group, .stroke-width-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
    }
    #strokeColor {
      width: 28px;
      height: 28px;
      border: 1px solid var(--ink);
      border-radius: 1px;
      cursor: pointer;
      padding: 0;
    }
    #strokeWidth { width: 80px; accent-color: var(--seal); }
    #strokeWidthValue {
      min-width: 20px;
      text-align: center;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--ink);
    }
    .tool-btn {
      padding: 7px;
      border: 1px solid var(--ink);
      background: var(--paper);
      border-radius: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: background 0.12s ease, color 0.12s ease;
    }
    .tool-btn:hover { background: var(--paper-soft); }
    .tool-btn.active {
      background: var(--ink);
      color: var(--paper);
    }
    .tool-btn svg { width: 16px; height: 16px; }
    .editor-canvas-container {
      flex: 1;
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--paper-soft);
      overflow: auto;
      min-height: 0;
    }
    #editorCanvas {
      border: 1px solid var(--ink);
      background: #ffffff;
      max-width: calc(100% - 20px);
      max-height: calc(100% - 20px);
      box-shadow: 3px 3px 0 0 var(--ink);
    }
    .editor-actions {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--ink);
      background: var(--paper-soft);
      justify-content: flex-end;
    }
    @media (max-width: 768px) {
      .editor-modal-content { width: 90vw; height: 85vh; }
      .editor-toolbar { flex-wrap: wrap; gap: 5px; }
      .tool-btn { padding: 6px; }
    }
    @media (min-width: 769px) {
      .editor-modal-content {
        width: 90vw !important;
        height: 85vh !important;
        max-width: 1400px !important;
        max-height: 900px !important;
      }
    }

    /* 对话框（升级/激活） */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .dialog {
      background: var(--paper);
      padding: 22px 22px 18px;
      border-radius: 2px;
      border: 1px solid var(--ink);
      box-shadow: 5px 5px 0 0 var(--ink);
      max-width: 320px;
      width: 90%;
    }
    .dialog h3 {
      margin: 0 0 14px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .dialog p {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.6;
    }
    .dialog ul {
      margin: 10px 0;
      padding-left: 18px;
      color: var(--ink-soft);
      font-size: 13px;
    }
    .dialog li { margin-bottom: 4px; }
    .pricing {
      margin: 14px 0;
      padding: 12px;
      background: var(--paper-soft);
      border: 1px solid var(--ink);
      border-radius: 1px;
      font-family: var(--mono);
    }
    .pricing p { margin: 4px 0; font-size: 12px; color: var(--ink); letter-spacing: 0.04em; }
    .pricing strong { color: var(--ink); }
    .discount {
      color: var(--seal);
      font-size: 11px;
      font-weight: 500;
    }
    .dialog-buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .dialog-buttons .btn {
      flex: 1;
      padding: 9px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
  <div class="header">
    <div class="title">智流华写助手</div>
    <div id="status" class="status stopped">未开始记录</div>
  </div>
  
  <!-- 订阅状态显示 -->
  <div id="subscriptionStatus" class="subscription-status" style="display: none;">
    <div id="subscriptionInfo" class="subscription-info">
      <!-- 动态内容 -->
    </div>
  </div>
  
  <!-- 用户状态（顶部徽章） -->
  <div id="userStatus" class="plan-badge" aria-live="polite"></div>
  
  <div id="usageInfo" class="usage-info">
    <div class="usage-progress">
      <div class="usage-text">加载中...</div>
    </div>
  </div>
  
  <div class="controls">
    <button id="startBtn" class="btn btn-primary">开始记录</button>
    <button id="stopBtn" class="btn btn-secondary" disabled>停止记录</button>
    <div class="longshot-wrapper">
      <button id="longShotBtn" class="btn btn-info">整页截图</button>
      <button id="cancelLongShotBtn" class="btn btn-secondary btn-small" style="display: none;">取消整页截图</button>
      <div id="longShotStatus" class="longshot-status"></div>
    </div>
    <button id="exportBtn" class="btn btn-info">导出文档</button>
    <button id="clearBtn" class="btn btn-primary">清空记录</button>
    <button id="upgradeBtn" class="btn btn-primary" style="display: none;">升级专业版</button>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <span>截图数量:</span>
      <span id="screenshotCount">0</span>
    </div>
    <div class="stat-item">
      <span>点击次数:</span>
      <span id="clickCount">0</span>
    </div>
    <div class="stat-item">
      <span>记录时长:</span>
      <span id="duration">00:00</span>
    </div>
  </div>
  
  <!-- 截图列表 -->
  <div class="screenshots-section">
    <h3 class="section-title">截图记录</h3>
    <div id="screenshotsList" class="screenshots-list">
      <div class="no-screenshots">暂无截图记录</div>
    </div>
  </div>
  </div>
  
  <!-- 升级提示模态框 -->
  <div id="upgradeModal" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <h3>升级专业版</h3>
      <p id="upgradeMessage">免费版已达到使用限制，升级专业版享受无限制使用。</p>
      <div class="pricing">
        <p><strong>季度版：¥19.9</strong></p>
        <p><strong>年费版：¥49.9</strong> <span class="discount">（省37%）</span></p>
      </div>
      <div class="dialog-buttons">
        <button id="upgradeNowBtn" class="btn btn-primary">立即升级</button>
        <button id="cancelUpgrade" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>
  
  <!-- 截图编辑器模态框 -->
  <div id="editorModal" class="editor-modal" style="display: none;">
    <div class="editor-modal-content">
      <div class="editor-header">
        <h3>编辑截图</h3>
        <button id="closeEditor" class="close-btn">&times;</button>
      </div>
      <div class="editor-body">
        <div class="editor-toolbar">
          <button class="tool-btn active" id="selectTool" title="选择工具">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            </svg>
          </button>
          <button class="tool-btn" id="textTool" title="文本工具">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
            </svg>
          </button>
          <button class="tool-btn" id="rectangleTool" title="矩形">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            </svg>
          </button>
          <button class="tool-btn" id="circleTool" title="圆形">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </button>
          <button class="tool-btn" id="lineTool" title="直线">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"/>
            </svg>
          </button>
          <button class="tool-btn" id="freeDrawTool" title="自由绘制">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
              <path d="M2 2l7.586 7.586"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
          </button>
          <button class="tool-btn" id="numberTool" title="序号标注">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <text x="12" y="16" text-anchor="middle" font-size="10" fill="currentColor">1</text>
            </svg>
          </button>
          <div class="toolbar-divider"></div>
          <div class="color-picker-group">
            <label for="strokeColor" title="线条颜色">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2l3 6 6 3-6 3-3 6-3-6-6-3 6-3z"/>
              </svg>
            </label>
            <input type="color" id="strokeColor" value="#ff0000">
          </div>
          <div class="stroke-width-group">
            <label for="strokeWidth" title="线条粗细">粗细:</label>
            <input type="range" id="strokeWidth" min="1" max="10" value="2">
            <span id="strokeWidthValue">2</span>
          </div>
        </div>
        <div class="editor-canvas-container">
          <canvas id="editorCanvas"></canvas>
        </div>
        <div class="editor-actions">
          <button id="saveEditor" class="btn btn-primary">保存</button>
          <button id="cancelEditor" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 激活码对话框 -->
  <div id="activationModal" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <h3>输入授权码</h3>
      <p>请输入您购买的专业版授权码：</p>
      <input type="text" id="authCodeInput" style="width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px;" placeholder="授权码格式：XXXX-XXXX-XXXX-XXXX">
      <p id="activationError" style="color: #f44336; font-size: 12px; margin: 5px 0;"></p>
      <div class="dialog-buttons">
        <button id="confirmActivation" class="btn btn-primary">确认激活</button>
        <button id="cancelActivation" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>
  
  <script src="fabric.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
