<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>截图编辑器 - CodeBuddy Pro</title>
    <link rel="stylesheet" href="editor.css">
    <!-- 引入外部库 -->
    <script src="fabric.min.js"></script>
    <script src="quill.min.js"></script>
    <script src="Sortable.min.js"></script>
    <script src="marked.min.js"></script>
    <link href="quill.snow.min.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部工具栏 -->
    <header class="toolbar">
        <div class="toolbar-left">
            <button class="toolbar-btn" id="backBtn" title="返回">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回
            </button>
            <div class="toolbar-divider"></div>
            <span class="project-title" id="projectTitle">编辑项目</span>
        </div>
        
        <div class="toolbar-center">
            <div class="tool-group">
                <button class="tool-btn active" id="selectTool" title="选择工具">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                    </svg>
                </button>
                <button class="tool-btn" id="textTool" title="文本工具">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
                    </svg>
                </button>
                <button class="tool-btn" id="rectangleTool" title="矩形">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    </svg>
                </button>
                <button class="tool-btn" id="circleTool" title="圆形">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </button>
                <button class="tool-btn" id="arrowTool" title="箭头">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14m-7-7l7 7-7 7"/>
                    </svg>
                </button>
                <button class="tool-btn" id="penTool" title="画笔">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                    </svg>
                </button>
                <button class="tool-btn" id="lineTool" title="直线">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6"/>
                    </svg>
                </button>
                <button class="tool-btn" id="highlighterTool" title="高亮笔">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="toolbar-right">
            <button class="toolbar-btn" id="undoBtn" title="撤销">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7v6h6"/>
                    <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                </svg>
            </button>
            <button class="toolbar-btn" id="redoBtn" title="重做">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 7v6h-6"/>
                    <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
                </svg>
            </button>
            <button class="toolbar-btn" id="deleteSelectionBtn" title="删除选中标注">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3,6 5,6 21,6"/>
                    <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
            </button>
            <div class="toolbar-divider"></div>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn primary" id="saveBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                    <polyline points="17,21 17,13 7,13 7,21"/>
                    <polyline points="7,3 7,8 15,8"/>
                </svg>
                保存修改
            </button>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-tabs">
                    <button class="sidebar-tab active" data-tab="screenshots">截图</button>
                    <button class="sidebar-tab" data-tab="layers">图层</button>
                    <button class="sidebar-tab" data-tab="properties">属性</button>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </button>
            </div>
            
            <!-- 截图面板 -->
            <div class="sidebar-panel active" id="screenshotsPanel">
                <div class="panel-header">
                    <h3>截图管理</h3>
                    <button class="panel-btn" id="addScreenshotBtn" title="添加截图">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div class="screenshots-list" id="screenshotsList">
                    <!-- 截图项目将在这里动态生成 -->
                </div>
            </div>
            
            <!-- 图层面板 -->
            <div class="sidebar-panel" id="layersPanel">
                <div class="panel-header">
                    <h3>图层管理</h3>
                    <button class="panel-btn" id="addLayerBtn" title="添加图层">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div class="layers-list" id="layersList">
                    <!-- 图层项目将在这里动态生成 -->
                </div>
            </div>
            
            <!-- 属性面板 -->
            <div class="sidebar-panel" id="propertiesPanel">
                <div class="panel-header">
                    <h3>属性设置</h3>
                </div>
                <div class="properties-content" id="propertiesContent">
                    <div class="property-group">
                        <label>颜色</label>
                        <input type="color" id="colorPicker" value="#ff0000">
                    </div>
                    <div class="property-group">
                        <label>线条粗细</label>
                        <input type="range" id="strokeWidth" min="1" max="20" value="2">
                        <span id="strokeWidthValue">2px</span>
                    </div>
                    <div class="property-group">
                        <label>透明度</label>
                        <input type="range" id="opacity" min="0" max="100" value="100">
                        <span id="opacityValue">100%</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 编辑区域 -->
        <section class="editor-area">
            <div class="editor-container">
                <!-- 左侧：截图编辑区域 -->
                <div class="canvas-section">
                    <div class="canvas-container" id="canvasContainer">
                        <canvas id="fabricCanvas"></canvas>
                    </div>
                </div>
                
                <!-- 右侧：文字内容显示区域 -->
                <div class="content-section" id="contentSection">
                    <div class="content-header">
                        <h3 id="contentTitle">步骤详情</h3>
                        <button class="content-toggle" id="contentToggle" title="折叠/展开">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 15l-6-6-6 6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="content-body" id="contentBody">
                        <div class="step-info" id="stepInfo">
                            <div class="step-title" id="stepTitle">步骤 1</div>
                            <div class="step-description" id="stepDescription">
                                <p>暂无描述信息</p>
                            </div>
                            <div class="step-metadata" id="stepMetadata">
                                <div class="metadata-item">
                                    <span class="metadata-label">URL:</span>
                                    <span class="metadata-value" id="stepUrl">-</span>
                                </div>
                                <div class="metadata-item">
                                    <span class="metadata-label">时间:</span>
                                    <span class="metadata-value" id="stepTime">-</span>
                                </div>
                                <div class="metadata-item">
                                    <span class="metadata-label">操作:</span>
                                    <span class="metadata-value" id="stepAction">-</span>
                                </div>
                            </div>
                        </div>

                        <!-- Markdown 编辑区域 -->
                        <div class="markdown-editor-container" id="markdownEditorContainer">
                            <div class="markdown-editor-header">
                                <h4>步骤描述编辑</h4>
                                <div class="markdown-mode-toggle">
                                    <button class="mode-btn active" id="editModeBtn" title="编辑模式">编辑</button>
                                    <button class="mode-btn" id="previewModeBtn" title="预览模式">预览</button>
                                </div>
                            </div>
                            <div class="markdown-editor-body">
                                <div class="markdown-editor" id="markdownEditor">
                                    <textarea id="markdownTextarea" placeholder="在此输入步骤描述，支持Markdown格式..."></textarea>
                                </div>
                                <div class="markdown-preview" id="markdownPreview" style="display: none;">
                                    <div id="markdownContent"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 文本编辑器 -->
                <div class="text-editor-overlay" id="textEditorOverlay" style="display: none;">
                    <div class="text-editor-container">
                        <div id="textEditor"></div>
                        <div class="text-editor-actions">
                            <button class="btn-secondary" id="cancelTextEdit">取消</button>
                            <button class="btn-primary" id="confirmTextEdit">确认</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 底部状态栏 -->
            <div class="status-bar">
                <div class="status-left">
                    <span id="canvasInfo">画布: 1920 x 1080</span>
                </div>
                <div class="status-right">
                    <span id="selectionInfo">未选择对象</span>
                </div>
            </div>
        </section>
    </main>

    <!-- 模态对话框 -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;">
        
        <!-- 添加截图对话框 -->
        <div class="modal" id="addScreenshotModal" style="display: none;">
            <div class="modal-header">
                <h3>添加截图</h3>
                <button class="modal-close" data-modal="addScreenshotModal">×</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="uploadArea">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <p>拖拽图片到此处或点击选择文件</p>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="editor.js"></script>
</body>
</html>
